name: Managed SOCKS5 Proxy

on:
  workflow_dispatch:

concurrency:
  group: managed-socks5-proxy
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start local SOCKS5 proxy
        env:
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: |
          npm start > /tmp/proxy.log 2>&1 &
          sleep 3
          if ! pgrep -f "node proxy-server.js" > /dev/null; then
            echo "Proxy failed to start"
            cat /tmp/proxy.log
            exit 1
          fi

      - name: Start VPS reverse tunnel
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_PROXY_PORT: ${{ secrets.VPS_PROXY_PORT }}
        run: |
          set -euo pipefail

          SSH_PORT="${VPS_SSH_PORT:-22}"
          PROXY_PORT="${VPS_PROXY_PORT:-1080}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_tunnel_key
          chmod 600 ~/.ssh/vps_tunnel_key

          for attempt in $(seq 1 12); do
            if ssh -fN \
              -p "$SSH_PORT" \
              -i ~/.ssh/vps_tunnel_key \
              -o ExitOnForwardFailure=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=3 \
              -o StrictHostKeyChecking=accept-new \
              -R "0.0.0.0:${PROXY_PORT}:127.0.0.1:8081" \
              "${VPS_USER}@${VPS_HOST}"; then
              break
            fi

            if [ "$attempt" = "12" ]; then
              echo "Failed to start reverse tunnel"
              exit 1
            fi

            sleep 10
          done

          echo "SOCKS5 endpoint: socks5://${PROXY_USER:-zen}:***@${VPS_HOST}:${PROXY_PORT}"

      - name: Keep alive and optionally renew
        env:
          RESTART_TOKEN: ${{ secrets.RESTART_TOKEN }}
        run: |
          sleep 19800

          if [ -z "${RESTART_TOKEN:-}" ]; then
            echo "RESTART_TOKEN is not set. Stopping without renewal."
            exit 0
          fi

          RESPONSE=$(mktemp)
          HTTP_CODE=$(curl -sS -L -o "$RESPONSE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $RESTART_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/proxy.yml/dispatches" \
            -d "{\"ref\":\"${GITHUB_REF_NAME:-main}\"}")

          cat "$RESPONSE"
          if [ "$HTTP_CODE" != "204" ]; then
            echo "Workflow renewal failed with HTTP $HTTP_CODE"
            exit 1
          fi
